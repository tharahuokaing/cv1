<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រវត្តិរូបសង្ខេប</title>
    <style>
        body {
            font-family: Arial, Khmer OS Battambang, sans-serif;
            margin: 40px;
            background-color: #f5f5f5;
        }

        .cv-container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1, h2 {
            color: #2c3e50;
        }

        .section {
            margin-bottom: 20px;
        }

        .label {
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        textarea {
            height: 80px;
        }

        hr {
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

<div class="cv-container">
    <h1>ប្រវត្តិរូបសង្ខេប (CV)</h1>

    <div class="section">
        <h2>ព័ត៌មានផ្ទាល់ខ្លួន</h2>
        <label class="label">ឈ្មោះ:</label>
        <input type="text" name="name">

        <label class="label">ថ្ងៃខែឆ្នាំកំណើត:</label>
        <input type="date" name="dob">

        <label class="label">ភេទ:</label>
        <input type="text" name="gender">

        <label class="label">អាសយដ្ឋាន:</label>
        <input type="text" name="address">

        <label class="label">ទូរស័ព្ទ:</label>
        <input type="tel" name="phone">

        <label class="label">អ៊ីមែល:</label>
        <input type="email" name="email">
    </div>

    <hr>

    <div class="section">
        <h2>គោលបំណងការងារ</h2>
        <textarea name="objective" placeholder="សរសេរគោលបំណងការងាររបស់អ្នកនៅទីនេះ..."></textarea>
    </div>

    <div class="section">
        <h2>ការអប់រំ</h2>
        <label><strong>ឆ្នាំ:</strong></label>
        <input type="text" name="education_year">

        <label><strong>សាលា/សាកលវិទ្យាល័យ:</strong></label>
        <input type="text" name="school">

        <label><strong>ជំនាញ:</strong></label>
        <input type="text" name="major">
    </div>

    <div class="section">
        <h2>បទពិសោធន៍ការងារ</h2>
        <label><strong>ក្រុមហ៊ុន:</strong></label>
        <input type="text" name="company">

        <label><strong>មុខតំណែង:</strong></label>
        <input type="text" name="position">

        <label><strong>រយៈពេល:</strong></label>
        <input type="text" name="duration">

        <label><strong>ភារកិច្ច:</strong></label>
        <textarea name="responsibilities"></textarea>
    </div>

    <div class="section">
        <h2>ជំនាញ</h2>
        <textarea name="skills" placeholder="បញ្ជីជំនាញរបស់អ្នក..."></textarea>
    </div>

    <div class="section">
        <h2>ភាសា</h2>
        <textarea name="languages" placeholder="បញ្ជីភាសាដែលអ្នកអាចប្រើ..."></textarea>
    </div>

    <div class="section">
        <h2>អ្នកធានា (Reference)</h2>
        <label>ឈ្មោះ:</label>
        <input type="text" name="ref_name">

        <label>មុខតំណែង:</label>
        <input type="text" name="ref_position">

        <label>ទូរស័ព្ទ:</label>
        <input type="tel" name="ref_phone">
    </div>
</div>

</body>
</html>
